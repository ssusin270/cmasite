name: IndexNow Ping

on:
  push:
    branches:
      - main   # or master, whichever your site deploys from

jobs:
  indexnow:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Submit URLs to IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        run: |
          # Build list of URLs from sitemap or hardcode key pages
          curl -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json" \
            -d '{
              "host": "mortgageaccesscenter.com",
              "key": "f6d0932349824cc280c6d813d0f62037",
              "keyLocation": "https://mortgageaccesscenter.com/f6d0932349824cc280c6d813d0f62037.txt",
              "urlList": [
                "https://mortgageaccesscenter.com/",
                "https://mortgageaccesscenter.com/aboutcma/",
                "https://mortgageaccesscenter.com/blog/"
              ]
            }'
